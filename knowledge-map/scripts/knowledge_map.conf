# knowledge_map.conf — Knowledge Map (KM) bundle defaults.
#
# This is the BUNDLE default. To override per project WITHOUT editing the bundle, drop a
# `.knowledge_map.conf` at your repo root with the same `:=` assignments; it is sourced
# first and therefore wins. Environment variables win over both.
#
# Every assignment uses ":=" (assign-only-if-unset) so precedence stays:
#     environment  >  repo-root .knowledge_map.conf  >  this bundle default

# Directories scanned for fact files (space-separated, repo-root-relative).
: "${KM_SCAN_DIRS:=docs/knowledge docs/decisions}"

# Where the derived map is written (repo-root-relative). This is your human-readable window.
: "${KM_OUTPUT:=KNOWLEDGE_MAP.md}"

# Title rendered at the top of the generated map.
: "${KM_TITLE:=Knowledge Map}"
