name: CI

# Repo-owned fast hygiene gate (NOT the multi-hour Phase-4 hierarchy
# downstream gate — that needs Verilator + Yosys and is run locally /
# manually per COMMIT.md, never in CI). Mirrors the COMMIT.md
# non-negotiable checklist: fmt, clippy -D warnings, full cargo test,
# and a clean mdBook build.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  hygiene:
    name: fmt / clippy / test / mdbook
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Doctrine-enforcement driver (E4): runs every registered doctrine check
      # (MEMORY-ARCH + KNOWLEDGE-MAP + the code-scoped CODE-CHANGE-EVIDENCE /
      # TASK-TREE-OWNERSHIP), meta-checks each check exists/executable, and fails
      # the build on any breach. The same driver runs locally via .githooks/pre-commit
      # (E3). See DOCTRINE_ENFORCEMENT.md.
      - name: doctrine enforcement (check_doctrines.sh)
        run: bash scripts/check_doctrines.sh

      - name: Install Rust (stable) + components
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --all --check
        run: cargo fmt --all --check

      - name: cargo clippy --all-targets -- -D warnings
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test

      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.cargo/bin"
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C "$HOME/.cargo/bin"

      - name: mdbook build book
        run: mdbook build book

      # `rust` blocks are illustrative IR sketches annotated
      # `rust,ignore` (BOOK-EXAMPLES-RUNNABLE.2.1); this asserts that
      # stays true and that any future real `rust` example compiles.
      # The 56 runnable `bash` examples are gated by the
      # `book_examples` integration test under `cargo test` above
      # (BOOK-EXAMPLES-RUNNABLE.2.2).
      - name: mdbook test book
        run: mdbook test book
